<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — KHADRA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
  <div class="login-page">
    <div class="login-card shadow-lg text-center">
      <div class="mb-4 d-flex flex-column align-items-center">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logoGradAuthLogin" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#74c69d" />
              <stop offset="100%" stop-color="#2d6a4f" />
            </linearGradient>
          </defs>
          <path d="M12 2C12 2 4 4 4 12C4 16.4183 7.58172 20 12 20C16.4183 20 20 16.4183 20 12C20 4 12 2 12 2Z" fill="url(#logoGradAuthLogin)"/>
          <path d="M12 2V20" stroke="#1b4332" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M12 13C12 13 14 10 16 10" stroke="#1b4332" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 16C12 16 9 14 7 14" stroke="#1b4332" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2 class="fw-bold mt-3">KHADRA</h2>
        <p class="text-secondary">Gestion de pépinière</p>
      </div>
      <% if (typeof error !== 'undefined' && error && error.length > 0) { %>
        <div class="alert alert-danger px-3 py-2"><i class="bi bi-exclamation-triangle-fill me-2"></i><%= error %></div>
      <% } %>
      <form method="POST" action="/login" class="text-start">
        <div class="mb-3">
          <label for="email" class="form-label fw-bold"><i class="bi bi-envelope me-2"></i>Email</label>
          <input type="email" class="form-control py-2" id="email" name="email" required autofocus>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-bold"><i class="bi bi-lock me-2"></i>Password</label>
          <input type="password" class="form-control py-2" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background: #2d6a4f; border: none;">Se connecter</button>
      </form>
      <div class="mt-4 pt-2 border-top">
        <p class="small text-muted mb-0">Pas de compte ? <a href="/register" class="text-primary fw-bold text-decoration-none">S'inscrire</a></p>
      </div>
    </div>
  </div>
</body>
</html>
