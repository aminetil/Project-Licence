<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — KHADRA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
  <div class="login-page" style="min-height: 100vh; padding: 40px 0;">
    <div class="login-card shadow-lg text-center" style="max-width: 500px;">
      <div class="mb-4 d-flex flex-column align-items-center">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logoGradAuthReg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#74c69d" />
              <stop offset="100%" stop-color="#2d6a4f" />
            </linearGradient>
          </defs>
          <path d="M12 2C12 2 4 4 4 12C4 16.4183 7.58172 20 12 20C16.4183 20 20 16.4183 20 12C20 4 12 2 12 2Z" fill="url(#logoGradAuthReg)"/>
          <path d="M12 2V20" stroke="#1b4332" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M12 13C12 13 14 10 16 10" stroke="#1b4332" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 16C12 16 9 14 7 14" stroke="#1b4332" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2 class="fw-bold mt-3">Create Account</h2>
        <p class="text-secondary">Join the KHADRA Community</p>
      </div>

      <% if (typeof error !== 'undefined' && error && error.length > 0) { %>
        <div class="alert alert-danger px-3 py-2"><i class="bi bi-exclamation-triangle-fill me-2"></i><%= error %></div>
      <% } %>

      <form method="POST" action="/register" class="text-start">
        <div class="row g-3">
          <div class="col-12">
            <label for="nom" class="form-label fw-bold">Full Name</label>
            <input type="text" class="form-control py-2" id="nom" name="nom" required>
          </div>
          <div class="col-12">
            <label for="email" class="form-label fw-bold">Email</label>
            <input type="email" class="form-control py-2" id="email" name="email" required>
          </div>
          <div class="col-md-6">
            <label for="password" class="form-label fw-bold">Password</label>
            <input type="password" class="form-control py-2" id="password" name="password" minlength="6" required>
          </div>
          <div class="col-md-6">
            <label for="confirm_password" class="form-label fw-bold">Confirm Password</label>
            <input type="password" class="form-control py-2" id="confirm_password" name="confirm_password" minlength="6" required>
          </div>
          <div class="col-12">
            <label for="telephone" class="form-label fw-bold">Phone Number</label>
            <input type="text" class="form-control py-2" id="telephone" name="telephone">
          </div>
          <div class="col-12">
            <label for="adresse" class="form-label fw-bold">Address</label>
            <textarea class="form-control py-2" id="adresse" name="adresse" rows="2"></textarea>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2 fw-bold">Register</button>
          </div>
        </div>
      </form>
      
      <div class="mt-4">
        <p class="text-muted">Already have an account? <a href="/login" class="text-decoration-none fw-bold" style="color:var(--green-600);">Log In</a></p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
