<%- include('../partials/header.html') %>

<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="mb-0">
    <i class="bi bi-<%= plante ? 'pencil' : 'plus-circle' %> me-2"></i>
    <%= plante ? 'Edit Plant' : 'Add a Plant' %>
  </h1>
  <a href="/admin/plantes" class="btn btn-outline-primary">
    <i class="bi bi-arrow-left me-1"></i> Back
  </a>
</div>

<div class="card">
  <div class="card-body p-4">
    <form method="POST" 
          action="<%= plante ? '/admin/plantes/' + plante.id + '?_method=PUT' : '/admin/plantes' %>" 
          enctype="multipart/form-data">
      <div class="row g-3">
        <!-- Basic Info -->
        <div class="col-md-6">
          <label for="nom" class="form-label fw-bold">Plant Name *</label>
          <input type="text" class="form-control" id="nom" name="nom" value="<%= plante ? plante.nom : '' %>" required>
        </div>
        <div class="col-md-6">
          <label for="species" class="form-label fw-bold">Species (Scientific Name)</label>
          <input type="text" class="form-control" id="species" name="species" value="<%= plante ? plante.species : '' %>" placeholder="e.g. Rosa gallica">
        </div>
        
        <div class="col-md-4">
          <label for="categorie" class="form-label fw-bold">Category *</label>
          <select class="form-select" id="categorie" name="categorie" required>
            <option value="">Choose...</option>
            <% CATEGORIES.forEach(c => { %>
              <option value="<%= c %>" <%= plante && plante.categorie === c ? 'selected' : '' %>><%= c.replace('_', ' ') %></option>
            <% }); %>
          </select>
        </div>
        <div class="col-md-4">
          <label for="growth_status" class="form-label fw-bold">Growth Status *</label>
          <select class="form-select" id="growth_status" name="growth_status" required>
            <% GROWTH_STATUSES.forEach(s => { %>
              <option value="<%= s %>" <%= plante && plante.growth_status === s ? 'selected' : '' %>><%= s.replace('_', ' ') %></option>
            <% }); %>
          </select>
        </div>
        <div class="col-md-4">
          <label for="location" class="form-label fw-bold">Default Location</label>
          <select class="form-select" id="location" name="location">
            <% LOCATIONS.forEach(l => { %>
              <option value="<%= l %>" <%= plante && plante.location === l ? 'selected' : '' %>><%= l.replace('_', ' ') %></option>
            <% }); %>
          </select>
        </div>

        <!-- Pricing & Stock -->
        <div class="col-md-4">
          <label for="cout" class="form-label fw-bold">Cost Price (DA) *</label>
          <input type="number" step="0.01" class="form-control" id="cout" name="cout" value="<%= plante ? plante.cout : '' %>" required>
        </div>
        <div class="col-md-4">
          <label for="prix" class="form-label fw-bold">Selling Price (DA) *</label>
          <input type="number" step="0.01" class="form-control" id="prix" name="prix" value="<%= plante ? plante.prix : '' %>" required>
        </div>
        <div class="col-md-4">
          <label for="quantite" class="form-label fw-bold">Initial Quantity</label>
          <input type="number" class="form-control" id="quantite" name="quantite" value="<%= plante ? plante.quantite : 0 %>">
        </div>

        <!-- Characteristics -->
        <div class="col-md-4">
          <label for="seasonality" class="form-label fw-bold">Seasonality</label>
          <select class="form-select" id="seasonality" name="seasonality">
            <% SEASONALITIES.forEach(s => { %>
              <option value="<%= s %>" <%= plante && plante.seasonality === s ? 'selected' : '' %>><%= s.replace('_', ' ') %></option>
            <% }); %>
          </select>
        </div>
        <div class="col-md-4">
          <label for="watering" class="form-label fw-bold">Watering Needs</label>
          <select class="form-select" id="watering" name="watering">
            <% WATERING_OPTS.forEach(a => { %>
              <option value="<%= a %>" <%= plante && plante.watering === a ? 'selected' : '' %>><%= a %></option>
            <% }); %>
          </select>
        </div>
        <div class="col-md-4">
          <label for="light_needs" class="form-label fw-bold">Light Needs</label>
          <select class="form-select" id="light_needs" name="light_needs">
            <% LIGHT_OPTS.forEach(l => { %>
              <option value="<%= l %>" <%= plante && plante.light_needs === l ? 'selected' : '' %>><%= l.replace('_', ' ') %></option>
            <% }); %>
          </select>
        </div>

        <!-- Image & Description -->
        <div class="col-md-12">
          <label for="image" class="form-label fw-bold">Image</label>
          <input type="file" class="form-control" id="image" name="image" accept="image/*">
          <% if (plante && plante.image) { %>
            <small class="text-muted">Current image: <img src="<%= plante.image %>" style="height:30px; border-radius:4px; margin-left:6px;"></small>
          <% } %>
        </div>
        <div class="col-12">
          <label for="description" class="form-label fw-bold">Description</label>
          <textarea class="form-control" id="description" name="description" rows="3"><%= plante ? (plante.description || '') : '' %></textarea>
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-circle me-1"></i>
            <%= plante ? 'Save Changes' : 'Add Plant' %>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<%- include('../partials/footer.html') %>
